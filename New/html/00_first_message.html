<!-- ============================================
     예시: 퍼스트 메시지
     ============================================
     이 파일은 build.ps1에 의해 risu/first_message.txt로 병합됩니다.
     RisuAI 캐릭터 설정의 "첫 메시지"에 붙여넣습니다.

     CBS 문법을 사용하여 조건부 UI를 구성할 수 있습니다.
     risu-btn 속성으로 Lua 버튼 핸들러와 연동합니다.
     ============================================ -->
{MY_PANEL}
{{#if {{equal::{{getvar::cv_step}}::0}}}}
<div style="text-align:center;padding:20px">
<div style="font-size:20px;font-weight:bold;color:#ffd700;margin-bottom:12px">{{char}}</div>
<div style="color:#aaa;margin-bottom:20px">시작하려면 아래 버튼을 클릭하세요.</div>
<div class="my-btn my-btn-primary" risu-btn="start-btn" style="display:inline-block;padding:12px 32px;font-size:15px">시작하기</div>
</div>
{{/if}}
{{#if {{equal::{{getvar::cv_step}}::1}}}}
<div style="text-align:center;padding:20px">
<div style="font-size:18px;color:#ffd700;margin-bottom:16px">선택하세요</div>
<div class="my-card-grid">
<div class="my-card" risu-btn="item-sword">검</div>
<div class="my-card" risu-btn="item-staff">지팡이</div>
<div class="my-card" risu-btn="item-bow">활</div>
</div>
</div>
{{/if}}
